name: Weekly SEO Report

on:
  schedule:
    # 毎週月曜 07:00 JST = 日曜 22:00 UTC
    - cron: '0 22 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-gsc:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch GSC data
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL: ${{ vars.GSC_SITE_URL || 'https://shitugyoukyufu.com/' }}
        run: python scripts/fetch_gsc.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/analytics/raw
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "chore(analytics): weekly GSC snapshot $(date -u +%Y-%m-%d)"
          git push
