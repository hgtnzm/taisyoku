name = "taisyoku-guestbook"
main = "src/index.ts"
compatibility_date = "2026-05-15"
workers_dev = true

# Wrangler 4 が親ディレクトリの Jekyll _config.yml を誤検知して
# `npx bundle exec jekyll build` を実行しようとするのを無効化。
[build]
command = ""

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "06ce7af68cdf42708a77f2cf2885d530"

[vars]
GITHUB_OWNER = "hgtnzm"
GITHUB_REPO = "taisyoku"
# 本番（main マージ後）は "main" に変更してから wrangler deploy で本番化
GITHUB_BRANCH = "claude/vibrant-panini-a25e39"

# Secrets (wrangler secret put で投入済み):
# - GITHUB_TOKEN
# - TELEGRAM_BOT_TOKEN
# - TELEGRAM_CHAT_ID
# - IP_HASH_SALT
